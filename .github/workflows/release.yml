name: Release

# Build and publish desktop binaries when a version tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
# To dry-run the build matrix without publishing, trigger manually from the
# Actions tab (workflow_dispatch); the release job is skipped for those runs.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, platform: darwin, arch: arm64, asset: MarkRover-macos-arm64.zip }
          - { os: windows-latest, platform: win32, arch: x64, asset: MarkRover-win32-x64.zip }
          - { os: ubuntu-latest, platform: linux, arch: x64, asset: MarkRover-linux-x64.tar.gz }
          - { os: ubuntu-latest, platform: linux, arch: arm64, asset: MarkRover-linux-arm64.tar.gz }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package
        run: node scripts/package.ts --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      # Each runner archives with the tool native to its OS, so we never depend
      # on `zip` being present on Windows or on a cross-OS archiver.
      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "out/MarkRover-darwin-${{ matrix.arch }}/MarkRover.app" "out/${{ matrix.asset }}"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "out/MarkRover-win32-${{ matrix.arch }}" -DestinationPath "out/${{ matrix.asset }}"

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "out/${{ matrix.asset }}" -C out "MarkRover-linux-${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
